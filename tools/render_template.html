<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Excalidraw Renderer</title>
  <style>
    body { margin: 0; padding: 0; background: white; }
    #container { position: absolute; top: 0; left: 0; }
  </style>
  <script>
    // Process polyfill — MUST be set before bundle loads
    window.process = { env: { NODE_ENV: 'production' } };
    window.global = window;
  </script>
  <script src="./excalidraw-bundle.js"></script>
  <script>
    window.renderDiagram = async function(jsonData) {
      try {
        const data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        const svg = await window.__exportToSvg({
          elements,
          appState: {
            ...appState,
            exportWithDarkMode: appState.exportWithDarkMode || false,
            exportBackground: true,
          },
          files,
          exportPadding: 20,
        });

        // Get SVG dimensions
        const width = parseInt(svg.getAttribute('width')) || 800;
        const height = parseInt(svg.getAttribute('height')) || 600;

        // Serialize to string
        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(svg);

        return {
          success: true,
          width,
          height,
          svgString,
        };
      } catch (err) {
        return {
          success: false,
          error: err.message || String(err),
        };
      }
    };

    window.__moduleReady = true;
  </script>
</head>
<body>
  <div id="container"></div>
</body>
</html>
