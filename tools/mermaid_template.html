<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mermaid to Excalidraw Converter</title>
</head>
<body>
  <script type="module">
    import { parseMermaidToExcalidraw } from "https://esm.sh/@excalidraw/mermaid-to-excalidraw?bundle";

    window.__parseMermaid = async function(syntax) {
      try {
        const { elements, files } = await parseMermaidToExcalidraw(syntax);
        return {
          success: true,
          elements: elements || [],
          files: files || {},
        };
      } catch (err) {
        return {
          success: false,
          error: err.message || String(err),
        };
      }
    };

    window.__moduleReady = true;
  </script>
</body>
</html>
