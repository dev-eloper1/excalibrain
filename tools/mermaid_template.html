<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mermaid to Excalidraw Converter</title>
  <script>
    // Process polyfill for excalidraw bundle
    window.process = { env: { NODE_ENV: 'production' } };
    window.global = window;
  </script>
  <script src="./excalidraw-bundle.js"></script>
</head>
<body>
  <script type="module">
    import { parseMermaidToExcalidraw } from "https://esm.sh/@excalidraw/mermaid-to-excalidraw?bundle";

    window.__parseMermaid = async function(syntax) {
      try {
        const { elements, files } = await parseMermaidToExcalidraw(syntax);

        // Use the library's convertToExcalidrawElements to transform
        // the skeleton format (with label properties) into proper
        // Excalidraw elements (with bound text elements).
        let fullElements = elements || [];
        if (window.__convertToExcalidrawElements && fullElements.length > 0) {
          try {
            fullElements = window.__convertToExcalidrawElements(fullElements);
          } catch (e) {
            console.warn('convertToExcalidrawElements failed, using raw elements:', e);
          }
        }

        return {
          success: true,
          elements: fullElements,
          files: files || {},
        };
      } catch (err) {
        return {
          success: false,
          error: err.message || String(err),
        };
      }
    };

    window.__moduleReady = true;
  </script>
</body>
</html>
